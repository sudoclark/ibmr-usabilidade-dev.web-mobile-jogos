<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artistas — iHeard</title>
    <link rel="stylesheet" href="style-artists.css">
    <link rel="stylesheet" href="../index/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ==== HEADER ==== -->
    <header>
        <nav>
            <div class="logo"><a href="../index/index.html" style="color:inherit;text-decoration:none;">iHeard<span></span></a></div>
            <ul class="nav-links">
                <li><a href="../index/index.html">Resenhas</a></li>
                <li><a href="../about/about.html">Sobre mim</a></li>
                <li><a href="../artists/artists.html" class="active">Artistas</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </nav>
        <div class="mobile-menu" id="mobile-menu">
            <a href="../index/index.html">Resenhas</a>
            <a href="../about/about.html">Sobre mim</a>
            <a href="../artists/artists.html">Artistas</a>
        </div>
    </header>

    <!-- ==== HERO ==== -->
    <section class="hero">
        <p class="hero-label">✦ quem faz a música</p>
        <h1>Os <em>artistas</em></h1>
        <p>Curiosidades e informações sobre os artistas que passaram por aqui.</p>
    </section>

    <!-- ==== CARROSSEL ==== -->
    <main class="artists-main">
        <div class="carousel">
            <button class="carousel-btn" id="btn-prev">&#8592;</button>
            <div class="carousel-stage" id="carousel-stage">
                <!-- preenchido pelo JS -->
            </div>
            <button class="carousel-btn" id="btn-next">&#8594;</button>
        </div>
        <div class="carousel-dots" id="carousel-dots">
            <!-- pontos de navegação preenchidos pelo JS -->
        </div>
    </main>

    <footer>
        <p>iHeard &copy; 2025 &nbsp;·&nbsp; feito com <strong>&#9829;</strong> e muita música</p>
    </footer>

    <!-- ==== MODAL DO ARTISTA ==== -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-cover" id="m-cover"></div>
                <div class="modal-meta">
                    <p class="m-artist" id="m-name"></p>
                    <p class="m-title" id="m-genre"></p>
                    <p class="m-year" id="m-since"></p>
                </div>
            </div>
            <div class="modal-body">
                <h4>Curiosidades</h4>
                <p id="m-curiosities"></p>
                <h4>Álbuns famosos</h4>
                <div class="fav-tracks" id="m-albums"></div>
            </div>
            <button class="modal-close" id="btn-fechar">Fechar</button>
        </div>
    </div>

    <script src="script-artists.js"></script>
</body>
</html>
